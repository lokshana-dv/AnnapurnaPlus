# =============================================
# ANNAPURNA+ Backend Configuration
# =============================================

# Server Port
server.port=8080

# =============================================
# MySQL Database Configuration
# =============================================
# Change username/password to match your MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/annapurna_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Varahi08@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate Settings
# =============================================
# create-drop = creates tables fresh each restart (use 'update' to preserve data)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# Firebase Configuration
# =============================================
# Path to your Firebase service account JSON file
# Download from Firebase Console > Project Settings > Service Accounts
firebase.config.path=classpath:firebase-service-account.json

# =============================================
# File Upload Settings
# =============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# =============================================
# CORS Settings
# =============================================
# Frontend URL (React dev server)
frontend.url=http://localhost:5173

# =============================================
# App Settings
# =============================================
app.name=ANNAPURNA+
app.version=1.0.0
